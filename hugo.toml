baseURL = 'https://pabloib.com/'
languageCode = 'es-es'
title = 'Pablo IB | Tech Blog & Second Brain'
theme = 'paper'

# SEO
enableRobotsTXT = true
canonifyURLs = true
rssLimit = 20

[pagination]
  pagerSize = 10

[params]
  # Theme settings
  color = 'linen'
  name = 'Pablo IB'
  bio = 'Desarrollador • Escritor • Eterno aprendiz'
  github = 'pabloalgo'
  rss = true
  math = true
  disableHLJS = false
  monoDarkIcon = true

  # SEO & Social
  description = 'Blog personal sobre tecnología, IA, desarrollo y productividad. Mi segunda memoria refinada.'
  keywords = ['tecnología', 'ia', 'desarrollo', 'productividad', 'blog', 'programación']
  author = 'Pablo IB'
  image = '/images/og-image.svg'
  
  # Social links
  twitter = ''
  linkedin = ''
  instagram = ''
  
  # JSON-LD
  [params.jsonld]
    sameAs = [
      'https://github.com/pabloalgo'
    ]

# Taxonomies
[taxonomies]
  category = 'categories'
  tag = 'tags'

# Menú
[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Inicio'
    url = '/'
    weight = 1
  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/posts/'
    weight = 2
  [[menu.main]]
    identifier = 'about'
    name = 'Sobre mí'
    url = '/about/'
    weight = 3

# Outputs
[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']

# Sitemap
[sitemap]
  changefreq = 'weekly'
  filename = 'sitemap.xml'
  priority = 0.5

# Markup
[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = 'monokai'
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
