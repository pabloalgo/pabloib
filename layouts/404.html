{{ define "head" }}
  {{ partial "head.html" . }}
{{ end }}

{{ define "main" }}
<article class="mt-24 md:mt-32 flex flex-col items-center text-center space-y-6 px-4">
  <span class="material-symbols-outlined text-8xl text-slate-200 dark:text-slate-800">explore_off</span>

  <h1 class="text-6xl md:text-8xl font-headline font-extrabold text-on-surface tracking-tighter">
    404
  </h1>

  <p class="text-lg md:text-xl font-body text-on-surface-variant max-w-md">
    Esta página no existe. Igual que el bug que jurabas que habías arreglado.
  </p>

  <div class="flex flex-col sm:flex-row gap-3 pt-4">
    <a href="{{ .Site.BaseURL }}" class="inline-flex items-center gap-2 px-6 py-3 bg-primary text-on-primary font-label text-sm uppercase tracking-widest rounded-full hover:bg-primary/90 transition-colors active:scale-95 duration-200">
      <span class="material-symbols-outlined text-lg">home</span>
      Ir al inicio
    </a>
    <a href="{{ "/posts/" | relURL }}" class="inline-flex items-center gap-2 px-6 py-3 bg-surface-container-highest text-on-surface-variant font-label text-sm uppercase tracking-widest rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
      <span class="material-symbols-outlined text-lg">grid_view</span>
      Ver artículos
    </a>
  </div>

  <p class="pt-4 font-body text-sm text-outline">
    Si crees que esto es un error, <a href="mailto:hola@pabloib.com" class="text-primary hover:underline">dímelo</a>.
  </p>
</article>
{{ end }}
