{{- /* Prompt metadata: usecase badge + model chips */ -}}
{{- with .Params.usecase -}}
<span class="inline-flex items-center gap-1 px-3 py-1 bg-primary/10 text-primary font-label text-[10px] uppercase tracking-widest font-bold rounded-full">
  <span class="material-symbols-outlined" style="font-size: 14px;">bolt</span>
  {{ . }}
</span>
{{- end -}}
{{- range .Params.models -}}
<span class="px-2 py-1 bg-surface-container-highest text-on-surface-variant font-label text-[10px] uppercase tracking-widest rounded-full">
  {{ . }}
</span>
{{- end -}}
